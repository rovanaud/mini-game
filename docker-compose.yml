services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mini_game}
      POSTGRES_USER: ${POSTGRES_USER:-mini_game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mini_game}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mini_game} -d ${POSTGRES_DB:-mini_game}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-true}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      POSTGRES_DB: ${POSTGRES_DB:-mini_game}
      POSTGRES_USER: ${POSTGRES_USER:-mini_game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mini_game}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
